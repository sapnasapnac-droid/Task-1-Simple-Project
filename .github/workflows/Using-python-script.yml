name: Using python script
on:
    workflow_dispatch:
        inputs:
            update_level:
                description: 'How far to update'
                required: true
                default: 'minor'
                type: choice
                options:
                    - patch
                    - minor
                    - latest

jobs:
    update:

        runs-on: ubuntu-latest
        env:
            HUSKY: 0
        permissions:
            contents: write
            pull-requests: write
            issues: write

        steps:

            - name: Checkout code
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                node-version: '20'
                cache: 'npm'

            - name: Install dependencies (baseline)
              run: |
                set -o pipefail
                npm ci 2>&1 | tee /tmp/install.log

            - name: Update, build, and test with bisection-based self-healing
              id: update
              env:
                UPDATE_LEVEL: ${{ inputs.update_level }}
              run: python3 .github/scripts/dependency_update.py

            - name: Check for changes
              id: changed
              run: |
                if git diff --quiet package.json package-lock.json; then
                    echo "had_changes=false" >> $GITHUB_OUTPUT
                    echo "::notice::No dependency updates were available this run"
                else
                    echo "had_changes=true" >> $GITHUB_OUTPUT
                    echo "Changes detected — will create PR"
                fi

            - name: Create Pull Request
              if: steps.changed.outputs.had_changes == 'true'
              uses: peter-evans/create-pull-request@v7
              with:
                token: ${{ secrets.GITHUB_TOKEN }}
                commit-message: "chore: dependency update (${{ inputs.update_level }})"
                title: |
                  ${{ steps.update.outputs.test_outcome == 'failure' && '⚠️ [TESTS FAILING] ' || '' }}chore: Dependency update (${{ inputs.update_level }})
                labels: |
                  ${{ steps.update.outputs.test_outcome == 'failure' && 'dependencies,needs-review,tests-failing' || 'dependencies,automated' }}${{ inputs.update_level == 'latest' && ',major-update' || '' }}
                body: |
                    Automatic dependency update via self-healing workflow.

                    ## Update Summary
                    - **Update level:** `${{ inputs.update_level }}`
                    - **Main-loop attempts:** ${{ steps.update.outputs.attempts }}
                    - **Bisection trials:** ${{ steps.update.outputs.bisect_trials }}
                    - **Test result:** ${{ steps.update.outputs.test_outcome }}

                    ## Held back from this run

                    ${{ steps.update.outputs.reject_details || '_All available updates applied cleanly — nothing held back._' }}

                    ## Review Guidance
                    ${{ steps.update.outputs.test_outcome == 'failure' && '⚠️ **Tests failed even after bisecting available major bumps.** This may be a real regression — investigate before merging.' || '✅ Tests passed.' }}
                    ${{ steps.update.outputs.reject_details != '' && '⚠️ Held-back packages above need a coordinated manual update — read each migration guide before bumping.' || '' }}

                    Every entry in "Held back" was discovered empirically by the bisection step in this run — no static exclusion list is consulted. Generated by run #${{ github.run_number }}.
                branch: chore/deps-${{ inputs.update_level }}-${{ github.run_id }}
                delete-branch: true
