name: Robust Dependency Update Flow
on:
    workflow_dispatch:
        inputs:
            update_level:
                description: 'How far to update'
                required: true
                default: 'minor'
                type: choice
                options:
                    - patch
                    - minor
                    - latest

jobs:
    update:

        runs-on: ubuntu-latest
        env:
            HUSKY: 0
        permissions:
            contents: write
            pull-requests: write
            issues: write

        steps:

            - name: Checkout code
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                node-version: '20'
                cache: 'npm'

            - name: Install dependencies (baseline)
              run: |
                set -o pipefail
                npm ci 2>&1 | tee /tmp/install.log

            - name: Update, build, and test with bisecting self-healing rejection
              id: update
              run: |
                set -o pipefail
                npm install -g npm-check-updates

                TARGET="${{ inputs.update_level }}"
                MAX_ATTEMPTS=25

                cp package.json /tmp/pkg.orig
                cp package-lock.json /tmp/lock.orig

                # Probe: capture what every package COULD be bumped to (for held-back report)
                cp /tmp/pkg.orig /tmp/probe.json
                PROBE=$(ncu --packageFile /tmp/probe.json --target "$TARGET" --jsonUpgraded 2>/dev/null || echo '{}')
                if ! echo "$PROBE" | jq empty >/dev/null 2>&1; then
                    PROBE='{}'
                fi
                echo "Probe found $(echo "$PROBE" | jq 'length') packages with available updates"

                OUR_DEPS=$(jq -r '.dependencies, .devDependencies | keys[]' package.json | sort -u)
                HAS_BUILD=$(npm pkg get scripts.build | grep -cv '^{}$' || true)
                HAS_TEST=$(npm pkg get scripts.test  | grep -cv '^{}$' || true)

                # ----- State -----
                REJECT_FROM_CONFLICTS=""   # packages rejected because of ERESOLVE
                CULPRITS=""                # bisection-confirmed bad packages
                BISECT_SCOPE=""            # current narrowing window
                BISECT_TRIED=""            # what we rejected as a bisection trial last attempt
                LAST_OUTCOME=""            # "pass" | "fail" — set by build/test
                REJECT_LIST=""             # union of the three sources above; rebuilt each iteration
                TEST_OUTCOME="skipped"
                LOOP_RESULT=""

                # ----- CSV helpers -----
                count_csv() {
                    [ -z "$1" ] && echo 0 && return
                    echo "$1" | tr ',' '\n' | grep -cv '^$'
                }
                csv_subtract() {
                    comm -23 <(echo "$1" | tr ',' '\n' | sort -u) <(echo "$2" | tr ',' '\n' | sort -u) | paste -sd ','
                }
                csv_first_half() {
                    local total=$(count_csv "$1")
                    local mid=$(( total / 2 ))
                    [ "$mid" -lt 1 ] && mid=1
                    echo "$1" | tr ',' '\n' | head -n "$mid" | paste -sd ','
                }
                csv_contains() {
                    echo ",$1," | grep -q ",$2,"
                }

                build_reject_list() {
                    local list=""
                    [ -n "$REJECT_FROM_CONFLICTS" ] && list="$REJECT_FROM_CONFLICTS"
                    [ -n "$CULPRITS" ]             && list="${list:+$list,}$CULPRITS"
                    [ -n "$BISECT_TRIED" ]         && list="${list:+$list,}$BISECT_TRIED"
                    REJECT_LIST="$list"
                }

                # ----- Update-decision helpers -----
                identify_major_bumps() {
                    jq -r --slurpfile orig /tmp/pkg.orig '
                        (($orig[0].dependencies // {}) + ($orig[0].devDependencies // {})) as $o |
                        ((.dependencies // {}) + (.devDependencies // {})) as $n |
                        [ $n | to_entries[] |
                          select($o[.key] != null) |
                          select((.value | type) == "string" and ($o[.key] | type) == "string") |
                          select(
                              ((.value   | sub("[~^]";"") | split(".")[0])) !=
                              (($o[.key] | sub("[~^]";"") | split(".")[0]))
                          ) | .key
                        ] | join(",")
                    ' package.json
                }

                filter_new() {
                    # Drop items already in REJECT_LIST
                    build_reject_list
                    local input="$1"
                    local result=""
                    local pkg
                    IFS=',' read -ra ARR <<< "$input"
                    for pkg in "${ARR[@]}"; do
                        [ -z "$pkg" ] && continue
                        if ! csv_contains "$REJECT_LIST" "$pkg"; then
                            result="${result:+$result,}$pkg"
                        fi
                    done
                    echo "$result"
                }

                # ----- Bisection control -----
                advance_bisection() {
                    # If last attempt PASSED while bisecting, the culprit is in BISECT_TRIED
                    if [ -n "$BISECT_TRIED" ] && [ "$LAST_OUTCOME" = "pass" ]; then
                        BISECT_SCOPE="$BISECT_TRIED"
                        echo "🔬 Narrowing (pass): culprit IS in [$BISECT_TRIED]; scope -> [$BISECT_SCOPE]"
                    fi
                    BISECT_TRIED=""

                    local size=$(count_csv "$BISECT_SCOPE")
                    if [ "$size" -le 1 ] && [ -n "$BISECT_SCOPE" ]; then
                        CULPRITS="${CULPRITS:+$CULPRITS,}$BISECT_SCOPE"
                        echo "✅ Confirmed culprit: $BISECT_SCOPE"
                        BISECT_SCOPE=""
                        return
                    fi
                    if [ "$size" -eq 0 ]; then
                        return
                    fi

                    local first_half=$(csv_first_half "$BISECT_SCOPE")
                    BISECT_TRIED="$first_half"
                    echo "🔬 Bisect step: reject [$first_half] | active [$(csv_subtract "$BISECT_SCOPE" "$first_half")]"
                }

                plan_failure_step() {
                    # Returns 0 to retry, 1 to give up.
                    local phase_name="$1"

                    if [ -z "$BISECT_SCOPE" ] && [ -z "$BISECT_TRIED" ]; then
                        # First failure of this round — start fresh bisection
                        local majors actionable
                        majors=$(identify_major_bumps) || {
                            echo "::error::identify_major_bumps failed — see jq output above"
                            return 1
                        }
                        actionable=$(filter_new "$majors")
                        if [ -z "$actionable" ]; then
                            echo "::error::$phase_name failed; no major bumps left to bisect"
                            return 1
                        fi
                        BISECT_SCOPE="$actionable"
                        echo "🔬 Starting bisection on: $BISECT_SCOPE"
                    elif [ -n "$BISECT_TRIED" ]; then
                        # Failure while bisecting — culprit is NOT (only) in BISECT_TRIED
                        BISECT_SCOPE=$(csv_subtract "$BISECT_SCOPE" "$BISECT_TRIED")
                        echo "🔬 Narrowing (fail): culprit not in [$BISECT_TRIED]; scope -> [$BISECT_SCOPE]"
                    fi

                    advance_bisection
                    return 0
                }

                # ===================== Main loop =====================
                for attempt in $(seq 1 $MAX_ATTEMPTS); do
                    echo ""
                    echo "===== Attempt $attempt of $MAX_ATTEMPTS ====="

                    rm -rf node_modules lib dist
                    cp /tmp/pkg.orig package.json
                    cp /tmp/lock.orig package-lock.json

                    build_reject_list
                    if [ -n "$REJECT_LIST" ]; then
                        echo "Rejecting: $REJECT_LIST"
                        ncu -u --target "$TARGET" --reject "$REJECT_LIST"
                    else
                        ncu -u --target "$TARGET"
                    fi

                    # ----- Install -----
                    npm install 2>&1 | tee /tmp/install.log
                    INSTALL_EXIT=${PIPESTATUS[0]}

                    if [ $INSTALL_EXIT -ne 0 ]; then
                        if grep -qE "ETIMEDOUT|ECONNRESET|ENOTFOUND|EAI_AGAIN" /tmp/install.log; then
                            echo "::warning::Network issue, retrying in 10s"
                            sleep 10
                            continue
                        fi
                        if ! grep -q "ERESOLVE" /tmp/install.log; then
                            echo "::error::Non-ERESOLVE install failure"
                            cat /tmp/install.log
                            exit 1
                        fi

                        CANDIDATES=$( {
                            grep -oP "Conflicting peer dependency: \K[@a-z0-9/-]+" /tmp/install.log
                            grep -oP "peer \K[@a-z0-9/-]+(?=@)" /tmp/install.log
                            grep -oP "Found: \K[@a-z0-9/-]+(?=@)" /tmp/install.log
                        } | sort -u | tr '\n' ',' | sed 's/,$//')

                        OWNED=""
                        IFS=',' read -ra ARR <<< "$CANDIDATES"
                        for pkg in "${ARR[@]}"; do
                            [ -z "$pkg" ] && continue
                            if echo "$OUR_DEPS" | grep -qx "$pkg"; then
                                OWNED="${OWNED:+$OWNED,}$pkg"
                            fi
                        done
                        NEW=$(filter_new "$OWNED")

                        if [ -z "$NEW" ]; then
                            echo "::error::ERESOLVE conflict with no actionable packages"
                            cat /tmp/install.log
                            exit 1
                        fi
                        REJECT_FROM_CONFLICTS="${REJECT_FROM_CONFLICTS:+$REJECT_FROM_CONFLICTS,}$NEW"
                        echo "🔎 Reject (install conflict): $NEW"
                        continue
                    fi

                    # ----- Build -----
                    if [ "$HAS_BUILD" -gt 0 ]; then
                        echo "Running build..."
                        if npm run build 2>&1 | tee /tmp/build.log; then
                            echo "✅ Build succeeded"
                            LAST_OUTCOME="pass"
                        else
                            LAST_OUTCOME="fail"
                            if ! plan_failure_step "Build"; then
                                cat /tmp/build.log
                                exit 1
                            fi
                            continue
                        fi
                    fi

                    # ----- Test -----
                    if [ "$HAS_TEST" -gt 0 ]; then
                        echo "Running tests..."
                        if npm test 2>&1 | tee /tmp/test.log; then
                            echo "✅ Tests passed"
                            LAST_OUTCOME="pass"
                        else
                            LAST_OUTCOME="fail"
                            if plan_failure_step "Test"; then
                                continue
                            else
                                echo "::warning::Tests still failing — shipping PR for human review"
                                TEST_OUTCOME="failure"
                            fi
                        fi
                    fi

                    # If a successful attempt completed but bisection is still narrowing, continue
                    if [ -n "$BISECT_SCOPE" ] || [ -n "$BISECT_TRIED" ]; then
                        advance_bisection
                        continue
                    fi

                    # Finalize TEST_OUTCOME on the last good attempt
                    if [ "$HAS_TEST" -gt 0 ] && [ "$LAST_OUTCOME" = "pass" ]; then
                        TEST_OUTCOME="success"
                    fi

                    LOOP_RESULT="success"
                    break
                done

                if [ "$LOOP_RESULT" != "success" ] && [ "$TEST_OUTCOME" != "failure" ]; then
                    echo "::error::Could not converge after $MAX_ATTEMPTS attempts"
                    build_reject_list
                    echo "Final reject list: $REJECT_LIST"
                    exit 1
                fi

                # ===================== Held-back report =====================
                build_reject_list
                REJECT_DETAILS=$(jq -r -n \
                    --slurpfile orig /tmp/pkg.orig \
                    --argjson probe "$PROBE" \
                    --arg list "$REJECT_LIST" '
                    (($orig[0].dependencies // {}) + ($orig[0].devDependencies // {})) as $old |
                    ($list | split(",") | map(select(. != ""))) as $rejected |
                    $rejected[] |
                    select($probe[.] != null and $old[.] != null) |
                    "- **\(.)**: `\($old[.])` → `\($probe[.])`"
                ')

                {
                    echo "attempts=$attempt"
                    echo "test_outcome=$TEST_OUTCOME"
                    echo "rejected=$REJECT_LIST"
                    echo "culprits=$CULPRITS"
                    echo "conflict_rejects=$REJECT_FROM_CONFLICTS"
                    echo "reject_details<<EOF"
                    echo "$REJECT_DETAILS"
                    echo "EOF"
                } >> $GITHUB_OUTPUT

            - name: Check for changes
              id: changed
              run: |
                if git diff --quiet package.json package-lock.json; then
                    echo "had_changes=false" >> $GITHUB_OUTPUT
                    echo "::notice::No dependency updates were available this run"
                else
                    echo "had_changes=true" >> $GITHUB_OUTPUT
                    echo "Changes detected — will create PR"
                fi

            - name: Create Pull Request
              if: steps.changed.outputs.had_changes == 'true'
              uses: peter-evans/create-pull-request@v7
              with:
                token: ${{ secrets.GITHUB_TOKEN }}
                commit-message: "chore: dependency update (${{ inputs.update_level }})"
                title: |
                  ${{ steps.update.outputs.test_outcome == 'failure' && '⚠️ [TESTS FAILING] ' || '' }}chore: Dependency update (${{ inputs.update_level }})
                labels: |
                  ${{ steps.update.outputs.test_outcome == 'failure' && 'dependencies,needs-review,tests-failing' || 'dependencies,automated' }}${{ inputs.update_level == 'latest' && ',major-update' || '' }}
                body: |
                    Automatic dependency update via self-healing workflow with bisecting culprit detection.

                    ## Update Summary
                    - **Update level:** `${{ inputs.update_level }}`
                    - **Attempts to converge:** ${{ steps.update.outputs.attempts }}
                    - **Test result:** ${{ steps.update.outputs.test_outcome }}
                    - **Bisection-confirmed culprits:** `${{ steps.update.outputs.culprits || 'none' }}`
                    - **Install-conflict rejects:** `${{ steps.update.outputs.conflict_rejects || 'none' }}`

                    ## Held back from this run

                    ${{ steps.update.outputs.reject_details || '_All available updates applied cleanly — nothing held back._' }}

                    ## Review Guidance
                    ${{ steps.update.outputs.test_outcome == 'failure' && '⚠️ **Tests failed even after bisection.** This may be a real regression — investigate before merging.' || '✅ Tests passed.' }}
                    ${{ steps.update.outputs.reject_details != '' && '⚠️ Held-back packages above need a coordinated manual update — read each migration guide before bumping.' || '' }}

                    Generated by run #${{ github.run_number }}.
                branch: chore/deps-${{ inputs.update_level }}-${{ github.run_id }}
                delete-branch: true